    <path d="M714 700 C654 680 604 692 558 724" fill="none" stroke="#FFF9E6" stroke-width="14" stroke-linecap="round" opacity="0.72"/>
  </g>

  <!-- stars -->
  <g fill="#FFF9E6" opacity="0.95">
    <path d="M270 210 l18 42 46 4 -35 30 10 45 -39 -24 -40 24 10 -45 -35 -30 46 -4z"/>
    <path d="M740 520 l13 30 33 3 -25 21 7 32 -28 -17 -29 17 7 -32 -25 -21 33 -3z"/>
