    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#B86B00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- moon -->
  <circle cx="756" cy="210" r="88" fill="#FFF9E6" opacity="0.95"/>
  <circle cx="790" cy="180" r="88" fill="#FFD98A" opacity="0.78"/>

