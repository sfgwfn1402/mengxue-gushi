    <path d="M462 448 C492 480 536 480 566 448" fill="none" stroke="#A85C38" stroke-width="16" stroke-linecap="round"/>
    <circle cx="394" cy="430" r="30" fill="#FF9AA2" opacity="0.55"/>
    <circle cx="630" cy="430" r="30" fill="#FF9AA2" opacity="0.55"/>
